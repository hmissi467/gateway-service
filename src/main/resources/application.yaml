server:
  port: 8090

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: account-service
              uri: http://account-service:8081
              predicates:
                - Path=/api/accounts,/api/accounts/**

            - id: transaction-service
              uri: http://transaction-service:8082
              predicates:
                - Path=/api/transactions,/api/transactions/**